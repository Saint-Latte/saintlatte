<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja — Leandro Valle</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --surface3: #282828;
      --border: #2a2a2a; --text: #f0ede8; --muted: #888;
      --green: #337958; --green-light: #4aaa7a; --amber: #C49A27;
      --red: #c0392b; --cream: #FFFEF9;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

    /* ── LOCK ── */
    .lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 2rem; }
    .lock-brand { text-align: center; }
    .lock-brand h1 { font-size: 2.2rem; letter-spacing: .3em; font-weight: 700; color: var(--cream); }
    .lock-brand p { color: var(--muted); letter-spacing: .2em; font-size: .75rem; margin-top: .4rem; }
    .pin-display { display: flex; gap: .75rem; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--green); background: transparent; transition: background .15s; }
    .pin-dot.filled { background: var(--green); }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; width: 240px; }
    .pin-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 1rem; border-radius: 10px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: background .1s, transform .08s; user-select: none; }
    .pin-btn:active { background: var(--surface3); transform: scale(.96); }
    .pin-btn.del { font-size: .9rem; color: var(--muted); }
    .pin-btn.enter { background: var(--green); color: #fff; }
    .pin-error { color: var(--red); font-size: .8rem; min-height: 1.2em; text-align: center; }

    /* ── SHELL ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); padding: .6rem 1rem; flex-shrink: 0; gap: 1rem; }
    .topbar__brand { font-weight: 700; letter-spacing: .15em; font-size: .85rem; color: var(--cream); }
    .topbar__tabs { display: flex; gap: .25rem; }
    .topbar__tab { padding: .45rem .9rem; border-radius: 6px; cursor: pointer; font-size: .78rem; letter-spacing: .08em; font-weight: 600; color: var(--muted); transition: all .15s; border: 1px solid transparent; }
    .topbar__tab.active { background: var(--green); color: #fff; border-color: var(--green); }
    .topbar__tab:not(.active):hover { background: var(--surface2); color: var(--text); }
    .topbar__session { font-size: .72rem; color: var(--muted); text-align: right; line-height: 1.4; }
    .session-badge { display: inline-block; padding: .2rem .55rem; border-radius: 20px; font-size: .65rem; font-weight: 700; letter-spacing: .08em; }
    .session-badge.open { background: rgba(51,121,88,.2); color: var(--green-light); border: 1px solid var(--green); }
    .session-badge.closed { background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid var(--red); }
    .view { flex: 1; overflow: hidden; display: flex; }

    /* ── POS ── */
    .pos-layout { display: flex; width: 100%; }
    .pos-menu { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
    .pos-menu__cats { display: flex; gap: .3rem; padding: .75rem; overflow-x: auto; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); }
    .pos-menu__cats::-webkit-scrollbar { height: 3px; }
    .pos-menu__cats::-webkit-scrollbar-thumb { background: var(--border); }
    .cat-btn { padding: .4rem .85rem; border-radius: 20px; font-size: .73rem; letter-spacing: .08em; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all .12s; }
    .cat-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .cat-btn:not(.active):hover { background: var(--surface3); color: var(--text); }
    .pos-menu__search { padding: .5rem .75rem; flex-shrink: 0; }
    .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: 8px; font-size: .82rem; outline: none; }
    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--muted); }
    .pos-menu__grid { flex: 1; overflow-y: auto; padding: .75rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .5rem; align-content: start; }
    .pos-menu__grid::-webkit-scrollbar { width: 4px; }
    .pos-menu__grid::-webkit-scrollbar-thumb { background: var(--border); }
    .item-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem; cursor: pointer; transition: all .12s; position: relative; display: flex; flex-direction: column; gap: .3rem; }
    .item-card:hover { background: var(--surface3); border-color: var(--green); }
    .item-card__cat { font-size: .6rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
    .item-card__name { font-size: .8rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .item-card__price { font-size: .82rem; font-weight: 700; color: var(--amber); margin-top: auto; padding-top: .3rem; }
    .item-card__price.specialty { color: var(--muted); font-size: .7rem; font-style: italic; }
    .item-card__badge { position: absolute; top: .4rem; right: .4rem; background: var(--green); color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: .65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }

    /* ── CART ── */
    .pos-cart { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); }
    .pos-cart__header { padding: .75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .pos-cart__title { font-weight: 700; letter-spacing: .1em; font-size: .85rem; }
    .pos-cart__count { background: var(--surface3); padding: .2rem .55rem; border-radius: 20px; font-size: .7rem; color: var(--muted); }
    .pos-cart__note { padding: .5rem .75rem; flex-shrink: 0; }
    .cart-note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .45rem .65rem; border-radius: 7px; font-size: .78rem; outline: none; resize: none; }
    .cart-note-input:focus { border-color: var(--amber); }
    .cart-note-input::placeholder { color: var(--muted); }
    .pos-cart__items { flex: 1; overflow-y: auto; padding: .5rem .75rem; }
    .pos-cart__items::-webkit-scrollbar { width: 3px; }
    .cart-empty { text-align: center; color: var(--muted); padding: 2rem 1rem; font-size: .82rem; line-height: 1.6; }
    .cart-item { display: flex; align-items: center; gap: .5rem; padding: .5rem 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item__qty-ctrl { display: flex; align-items: center; gap: .3rem; }
    .qty-btn { width: 22px; height: 22px; border-radius: 5px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; }
    .qty-btn.del-btn { color: var(--red); }
    .cart-item__qty { font-size: .8rem; font-weight: 700; min-width: 20px; text-align: center; }
    .cart-item__info { flex: 1; min-width: 0; }
    .cart-item__name { font-size: .78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item__note { font-size: .68rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item__price { font-size: .8rem; font-weight: 700; color: var(--amber); white-space: nowrap; }
    .pos-cart__footer { padding: .75rem; border-top: 1px solid var(--border); flex-shrink: 0; }
    .cart-summary { margin-bottom: .75rem; }
    .cart-sum-row { display: flex; justify-content: space-between; font-size: .78rem; padding: .2rem 0; color: var(--muted); }
    .cart-sum-row.total { color: var(--text); font-weight: 700; font-size: 1rem; border-top: 1px solid var(--border); margin-top: .3rem; padding-top: .4rem; }
    .payment-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .5rem .7rem; border-radius: 8px; font-size: .82rem; margin-bottom: .5rem; outline: none; cursor: pointer; }
    .cash-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .45rem .65rem; border-radius: 7px; font-size: .82rem; outline: none; }
    .cash-input:focus { border-color: var(--amber); }
    .cash-row { display: flex; gap: .5rem; margin-bottom: .5rem; }
    .cash-change { font-size: .8rem; color: var(--green-light); padding: .3rem 0; }
    .cash-change.negative { color: var(--red); }
    .btn-cobrar { width: 100%; padding: .75rem; background: var(--green); color: #fff; border: none; border-radius: 10px; font-size: .9rem; font-weight: 700; letter-spacing: .12em; cursor: pointer; transition: background .15s; }
    .btn-cobrar:hover { background: var(--green-light); }
    .btn-cobrar:disabled { background: var(--surface3); color: var(--muted); cursor: not-allowed; }
    .btn-clear { width: 100%; padding: .45rem; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; font-size: .75rem; cursor: pointer; margin-top: .4rem; transition: all .12s; }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── ÓRDENES ── */
    .orders-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 1rem; gap: .75rem; }
    .orders-toolbar { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    .date-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .45rem .75rem; border-radius: 8px; font-size: .82rem; outline: none; cursor: pointer; }
    .date-input:focus { border-color: var(--green); }
    .orders-kpi { display: flex; gap: .75rem; flex-wrap: wrap; }
    .kpi-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .9rem; font-size: .75rem; }
    .kpi-chip span { display: block; color: var(--muted); font-size: .65rem; letter-spacing: .08em; margin-bottom: .15rem; }
    .kpi-chip strong { color: var(--amber); font-size: .95rem; }
    .orders-table-wrap { flex: 1; overflow-y: auto; }
    .orders-table-wrap::-webkit-scrollbar { width: 4px; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th { position: sticky; top: 0; background: var(--surface); padding: .6rem .75rem; text-align: left; font-size: .7rem; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .orders-table td { padding: .55rem .75rem; border-bottom: 1px solid var(--border); font-size: .8rem; vertical-align: middle; }
    .orders-table tr:hover td { background: var(--surface2); }
    .orders-table tr.cancelled td { opacity: .45; text-decoration: line-through; }
    .badge { display: inline-block; padding: .18rem .5rem; border-radius: 20px; font-size: .65rem; font-weight: 700; letter-spacing: .06em; }
    .badge-efectivo { background: rgba(51,121,88,.2); color: var(--green-light); }
    .badge-tarjeta { background: rgba(41,128,185,.2); color: #5dade2; }
    .badge-transferencia { background: rgba(196,154,39,.2); color: var(--amber); }
    .badge-cancelled { background: rgba(192,57,43,.15); color: #e74c3c; }
    .btn-cancel-order { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .25rem .55rem; border-radius: 5px; font-size: .68rem; cursor: pointer; }
    .btn-cancel-order:hover { border-color: var(--red); color: var(--red); }
    .order-items-detail { font-size: .72rem; color: var(--muted); line-height: 1.5; }

    /* ── REPORTES ── */
    .reports-view { flex: 1; overflow-y: auto; padding: 1rem; }
    .reports-view::-webkit-scrollbar { width: 4px; }
    .reports-header { display: flex; gap: .75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .reports-header h2 { font-size: 1rem; letter-spacing: .12em; font-weight: 700; flex: 1; }
    .btn-whatsapp { display: flex; align-items: center; gap: .4rem; background: #25D366; color: #fff; border: none; border-radius: 8px; padding: .45rem .85rem; font-size: .78rem; font-weight: 700; cursor: pointer; letter-spacing: .04em; transition: background .15s; }
    .btn-whatsapp:hover { background: #1ebe5d; }
    .btn-whatsapp:disabled { opacity: .4; cursor: not-allowed; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; margin-bottom: 1.25rem; }
    .kpi-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
    .kpi-card__label { font-size: .65rem; letter-spacing: .12em; color: var(--muted); margin-bottom: .35rem; text-transform: uppercase; }
    .kpi-card__val { font-size: 1.5rem; font-weight: 700; color: var(--cream); line-height: 1; }
    .kpi-card__val.green { color: var(--green-light); }
    .kpi-card__val.amber { color: var(--amber); }
    .kpi-card__sub { font-size: .68rem; color: var(--muted); margin-top: .25rem; }
    .reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 900px) { .reports-grid { grid-template-columns: 1fr; } }
    .report-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
    .report-card__title { font-size: .72rem; letter-spacing: .1em; color: var(--muted); margin-bottom: .75rem; font-weight: 700; text-transform: uppercase; }
    .bar-chart { display: flex; flex-direction: column; gap: .45rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; }
    .bar-label { font-size: .72rem; color: var(--text); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s; }
    .bar-val { font-size: .7rem; color: var(--muted); min-width: 30px; text-align: right; }
    .hourly-chart { display: flex; align-items: flex-end; gap: 2px; height: 80px; padding-top: .5rem; }
    .hour-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .hour-bar { width: 100%; background: var(--surface3); border-radius: 2px 2px 0 0; min-height: 2px; transition: height .3s; position: relative; }
    .hour-bar.has-val { background: var(--green); }
    .hour-bar:hover::after { content: attr(title); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: .6rem; color: var(--text); background: var(--surface); padding: .1rem .3rem; border-radius: 3px; white-space: nowrap; pointer-events: none; }
    .hour-label { font-size: .55rem; color: var(--muted); }
    .pay-breakdown { display: flex; flex-direction: column; gap: .5rem; }
    .pay-row { display: flex; align-items: center; gap: .6rem; }
    .pay-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pay-name { font-size: .78rem; flex: 1; }
    .pay-pct { font-size: .72rem; color: var(--muted); }
    .pay-amt { font-size: .78rem; font-weight: 700; color: var(--amber); }

    /* ── CAJA ── */
    .caja-view { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .caja-view::-webkit-scrollbar { width: 4px; }
    .caja-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
    .caja-section__title { font-size: .72rem; letter-spacing: .15em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: .9rem; display: flex; align-items: center; gap: .5rem; }
    .caja-section__title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .session-status-big { display: flex; align-items: center; gap: 1rem; margin-bottom: .9rem; }
    .session-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--red); }
    .session-dot.open { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .session-info { font-size: .82rem; }
    .session-info strong { font-size: 1rem; }
    .caja-form { display: grid; gap: .65rem; }
    .form-row { display: flex; gap: .65rem; align-items: center; }
    .form-label { font-size: .75rem; color: var(--muted); width: 130px; flex-shrink: 0; }
    .form-input { flex: 1; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: 8px; font-size: .85rem; outline: none; }
    .form-input:focus { border-color: var(--green); }
    .caja-btns { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
    .btn-primary { padding: .6rem 1.2rem; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: .82rem; font-weight: 700; letter-spacing: .08em; cursor: pointer; transition: background .15s; }
    .btn-primary:hover:not(:disabled) { background: var(--green-light); }
    .btn-primary:disabled { background: var(--surface3); color: var(--muted); cursor: not-allowed; }
    .btn-secondary { padding: .6rem 1.2rem; background: var(--surface3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
    .btn-danger { padding: .6rem 1.2rem; background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid rgba(192,57,43,.3); border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; }
    .btn-danger:hover { background: rgba(192,57,43,.3); }
    .arqueo-table { width: 100%; border-collapse: collapse; }
    .arqueo-table td { padding: .45rem .6rem; font-size: .8rem; border-bottom: 1px solid var(--border); }
    .arqueo-table td:last-child { text-align: right; font-weight: 600; color: var(--amber); }
    .arqueo-table tr:last-child td { border-bottom: none; }
    .arqueo-diff-pos { color: var(--green-light) !important; }
    .arqueo-diff-neg { color: var(--red) !important; }
    .sessions-history { display: flex; flex-direction: column; gap: .5rem; max-height: 220px; overflow-y: auto; }
    .session-hist-item { background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .85rem; font-size: .75rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .3rem; }
    .session-hist-item span { color: var(--muted); font-size: .65rem; }
    .session-hist-item strong { color: var(--text); }
    .sync-info { font-size: .72rem; color: var(--muted); }
    .sync-info strong { color: var(--green-light); }
    .sync-error { color: var(--red); font-size: .78rem; margin: .4rem 0; }

    /* ── MODAL ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 420px; }
    .modal h3 { font-size: 1rem; letter-spacing: .1em; margin-bottom: .5rem; }
    .modal p { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }
    .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .6rem .8rem; border-radius: 8px; font-size: .9rem; outline: none; margin-bottom: .75rem; }
    .modal-input:focus { border-color: var(--green); }
    .modal-btns { display: flex; gap: .5rem; justify-content: flex-end; }
    .modal-btn { padding: .55rem 1.1rem; border-radius: 8px; font-size: .82rem; font-weight: 600; cursor: pointer; border: none; }
    .modal-btn.confirm { background: var(--green); color: #fff; }
    .modal-btn.cancel { background: var(--surface3); color: var(--muted); }

    /* ── ITEM MODAL (modificadores) ── */
    .item-modal { max-width: 500px; max-height: 92vh; overflow-y: auto; }
    .item-modal::-webkit-scrollbar { width: 3px; }
    .item-modal__header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .2rem; }
    .item-modal__close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .item-modal__meta { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; }
    .item-modal__meta strong { color: var(--amber); }
    .mod-group { margin-bottom: 1rem; }
    .mod-group__label { font-size: .65rem; letter-spacing: .12em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: .5rem; display: flex; align-items: center; gap: .4rem; }
    .mod-required { color: var(--red); font-weight: 400; }
    .mod-hint { color: var(--muted); font-weight: 400; font-size: .6rem; }
    .mod-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .mod-chip { padding: .38rem .8rem; border-radius: 20px; border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: .78rem; cursor: pointer; transition: all .12s; user-select: none; }
    .mod-chip:hover { border-color: var(--green); }
    .mod-chip.selected { background: var(--green); border-color: var(--green); color: #fff; }
    .mod-chip .extra { font-size: .65rem; opacity: .8; margin-left: .25rem; }
    .item-modal__note-label { font-size: .65rem; letter-spacing: .12em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: .4rem; }
    .item-modal__note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: 8px; font-size: .82rem; outline: none; margin-bottom: .9rem; }
    .item-modal__note-input:focus { border-color: var(--amber); }
    .item-modal__note-input::placeholder { color: var(--muted); }
    .item-modal__divider { height: 1px; background: var(--border); margin: .75rem 0; }
    .item-modal__qty-row { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .modal-qty-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .modal-qty-val { font-size: 1.1rem; font-weight: 700; min-width: 28px; text-align: center; }
    .item-modal__total { font-size: 1.4rem; font-weight: 700; color: var(--amber); margin-left: auto; line-height: 1; }
    .item-modal__total small { font-size: .7rem; color: var(--muted); font-weight: 400; display: block; text-align: right; }

    /* ── TOASTS ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 900; display: flex; flex-direction: column; gap: .5rem; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .65rem 1rem; font-size: .8rem; min-width: 200px; box-shadow: 0 4px 20px rgba(0,0,0,.4); display: flex; align-items: center; gap: .5rem; animation: slideIn .2s ease; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    .toast.info { border-color: var(--amber); }

    /* ── MESA SELECTOR (cart) ── */
    .cart-mesa-bar { padding: .5rem .75rem; border-bottom: 1px solid var(--border); display: flex; gap: .3rem; flex-wrap: wrap; align-items: center; }
    .mesa-chip { padding: .28rem .7rem; border-radius: 20px; font-size: .7rem; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: all .12s; color: var(--muted); background: var(--surface2); white-space: nowrap; }
    .mesa-chip.active { background: var(--amber); border-color: var(--amber); color: #0a0a0a; }
    .cart-llevar-input { background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: .3rem .6rem; border-radius: 7px; font-size: .78rem; outline: none; max-width: 130px; }
    .cart-llevar-input::placeholder { color: var(--muted); }
    .btn-guardar { width: 100%; padding: .6rem; background: var(--surface3); color: var(--amber); border: 1px solid var(--amber); border-radius: 10px; font-size: .82rem; font-weight: 700; letter-spacing: .1em; cursor: pointer; margin-bottom: .4rem; transition: all .15s; }
    .btn-guardar:hover:not(:disabled) { background: rgba(196,154,39,.15); }
    .btn-guardar:disabled { opacity: .35; cursor: not-allowed; }

    /* ── MESAS VIEW ── */
    .mesas-view { flex: 1; overflow-y: auto; padding: 1rem; }
    .mesas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .75rem; }
    .mesa-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all .15s; }
    .mesa-card:hover { background: var(--surface3); }
    .mesa-card.occupied { border-color: var(--amber); }
    .mesa-card__label { font-size: .85rem; font-weight: 700; letter-spacing: .08em; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; }
    .mesa-badge-occupied { font-size: .6rem; padding: .15rem .45rem; border-radius: 20px; background: var(--amber); color: #0a0a0a; font-weight: 700; letter-spacing: .06em; }
    .mesa-card__info { font-size: .72rem; color: var(--muted); line-height: 1.7; }
    .mesa-card__total { font-size: 1.3rem; font-weight: 700; color: var(--amber); margin-top: .5rem; }
    .mesa-card__actions { display: flex; gap: .5rem; margin-top: .75rem; }
    .mesa-card__btn { flex: 1; padding: .45rem; border-radius: 8px; font-size: .72rem; font-weight: 700; cursor: pointer; border: none; letter-spacing: .06em; }
    .mesa-card__btn.resume { background: var(--green); color: #fff; }
    .mesa-card__btn.pay { background: var(--amber); color: #0a0a0a; }
    .mesa-card__btn.del { background: var(--surface3); color: var(--muted); border: 1px solid var(--border); }

    /* ── PAYMENT OVERLAY (fullscreen) ── */
    .pay-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem; overflow-y: auto; }
    .pay-overlay__back { position: absolute; top: 1.25rem; left: 1.25rem; background: none; border: none; color: var(--muted); font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: .4rem; }
    .pay-overlay__back:hover { color: var(--text); }
    .pay-overlay__title { font-size: .82rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; text-align: center; }
    .pay-overlay__mesa { font-size: .78rem; color: var(--amber); letter-spacing: .08em; text-align: center; }
    .pay-overlay__total { font-size: 4rem; font-weight: 700; color: var(--cream); line-height: 1; text-align: center; }
    .pay-methods { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .pay-method-btn { width: 140px; height: 120px; background: var(--surface2); border: 2px solid var(--border); border-radius: 14px; color: var(--text); font-size: .88rem; font-weight: 700; letter-spacing: .06em; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .6rem; transition: all .15s; }
    .pay-method-btn:hover { background: var(--surface3); border-color: var(--green); color: var(--green-light); }
    .pay-method-icon { font-size: 2rem; }
    .pay-cash-section { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 360px; }
    .pay-cash-label { font-size: .75rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; }
    .pay-cash-input { width: 100%; text-align: center; font-size: 2.5rem; font-weight: 700; background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: .75rem; border-radius: 12px; outline: none; }
    .pay-cash-input:focus { border-color: var(--amber); }
    .pay-change-block { text-align: center; }
    .pay-change-label { font-size: .75rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: .3rem; }
    .pay-change-val { font-size: 4.5rem; font-weight: 700; color: var(--green-light); line-height: 1; }
    .pay-change-val.short { color: var(--red); }
    .pay-confirm-btn { width: 100%; max-width: 360px; padding: 1.1rem; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; cursor: pointer; transition: background .15s; }
    .pay-confirm-btn:hover { background: var(--green-light); }
    .pay-confirm-btn:disabled { background: var(--surface3); color: var(--muted); cursor: not-allowed; }

    /* ── EGRESOS ── */
    .egresos-list { display: flex; flex-direction: column; gap: .4rem; margin-top: .75rem; max-height: 200px; overflow-y: auto; }
    .egreso-row { display: flex; align-items: center; gap: .75rem; font-size: .8rem; padding: .45rem .7rem; background: var(--surface3); border-radius: 7px; }
    .egreso-row__time { color: var(--muted); font-size: .68rem; flex-shrink: 0; }
    .egreso-row__desc { flex: 1; color: var(--text); }
    .egreso-row__amt { color: var(--red); font-weight: 700; white-space: nowrap; }

    /* ── DENOMINACIONES (arqueo) ── */
    .denom-section { margin-top: .25rem; }
    .denom-group-label { font-size: .63rem; letter-spacing: .12em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin: .65rem 0 .3rem; }
    .denom-rows { display: flex; flex-direction: column; gap: .18rem; }
    .denom-row { display: flex; align-items: center; gap: .45rem; }
    .denom-label { width: 46px; font-size: .85rem; font-weight: 700; color: var(--text); }
    .denom-x { font-size: .7rem; color: var(--muted); flex-shrink: 0; }
    .denom-input { width: 62px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: .28rem .4rem; border-radius: 6px; font-size: .9rem; text-align: center; outline: none; -moz-appearance: textfield; }
    .denom-input::-webkit-outer-spin-button, .denom-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .denom-input:focus { border-color: var(--green); }
    .denom-eq { font-size: .65rem; color: var(--muted); flex-shrink: 0; }
    .denom-sub { font-size: .78rem; color: var(--amber); min-width: 58px; text-align: right; font-weight: 600; }
    .denom-sub.zero { color: var(--surface3); }
    .denom-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: .8rem; padding-top: .7rem; border-top: 2px solid var(--border); }
    .denom-total-label { font-size: .82rem; font-weight: 700; letter-spacing: .08em; color: var(--text); }
    .denom-total-val { font-size: 1.65rem; font-weight: 700; color: var(--amber); }
    .disc-note-label { font-size: .63rem; letter-spacing: .1em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin: .9rem 0 .3rem; }
    .disc-note-input { width: 100%; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: .5rem .75rem; border-radius: 8px; font-size: .82rem; outline: none; resize: none; }
    .disc-note-input:focus { border-color: var(--amber); }
    .disc-note-input::placeholder { color: var(--muted); font-size: .78rem; }
    .btn-denom-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .2rem .5rem; border-radius: 6px; font-size: .63rem; cursor: pointer; transition: all .12s; margin-left: .4rem; }
    .btn-denom-reset:hover { border-color: var(--red); color: var(--red); }

    /* ── EXTRA PRICE (item modal) ── */
    .extra-price-row { display: flex; align-items: center; gap: .6rem; margin-bottom: .9rem; }
    .extra-price-row label { font-size: .65rem; letter-spacing: .12em; color: var(--muted); font-weight: 700; text-transform: uppercase; white-space: nowrap; }
    .extra-price-input { width: 110px; background: var(--surface2); border: 1px solid var(--border); color: var(--amber); padding: .45rem .7rem; border-radius: 8px; font-size: .95rem; font-weight: 700; outline: none; text-align: center; }
    .extra-price-input:focus { border-color: var(--amber); }
    .extra-price-input::placeholder { color: var(--muted); font-size: .78rem; font-weight: 400; }

    /* ── UTILS ── */
    .text-muted { color: var(--muted); }
    .text-amber { color: var(--amber); }
    .text-green { color: var(--green-light); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: .85rem; line-height: 1.8; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ LOCK ══ -->
  <div v-if="!unlocked" class="lock-screen">
    <div class="lock-brand">
      <h1>SAINT LATTE</h1>
      <p>CAJA · LEANDRO VALLE</p>
    </div>
    <div class="pin-display">
      <div v-for="i in 4" :key="i" class="pin-dot" :class="{filled: pinInput.length >= i}"></div>
    </div>
    <div class="pin-pad">
      <button v-for="n in [1,2,3,4,5,6,7,8,9]" :key="n" class="pin-btn" @click="pinPress(String(n))">{{n}}</button>
      <button class="pin-btn del" @click="pinPress('del')">⌫</button>
      <button class="pin-btn" @click="pinPress('0')">0</button>
      <button class="pin-btn enter" @click="pinPress('enter')">OK</button>
    </div>
    <p class="pin-error">{{pinError}}</p>
  </div>

  <!-- ══ APP ══ -->
  <template v-else>
    <div class="app">

      <!-- TOPBAR -->
      <div class="topbar">
        <span class="topbar__brand">SAINT LATTE · LV</span>
        <div class="topbar__tabs">
          <div v-for="t in tabs" :key="t.id" class="topbar__tab" :class="{active: activeTab===t.id}" @click="activeTab=t.id">{{t.label}}</div>
        </div>
        <div class="topbar__session">
          <span class="session-badge" :class="session.open ? 'open' : 'closed'">{{session.open ? 'CAJA ABIERTA' : 'CAJA CERRADA'}}</span>
          <template v-if="session.open"><br><strong style="color:var(--amber)">Fondo: ${{session.opening}}</strong></template>
        </div>
      </div>

      <div class="view">

        <!-- ══ COMANDAR ══ -->
        <template v-if="activeTab==='pos'">
          <div class="pos-layout">
            <!-- MENÚ -->
            <div class="pos-menu">
              <div class="pos-menu__cats">
                <button v-for="cat in categories" :key="cat" class="cat-btn" :class="{active: activeCat===cat}" @click="activeCat=cat">{{cat}}</button>
              </div>
              <div class="pos-menu__search">
                <input class="search-input" v-model="searchQ" placeholder="Buscar producto…">
              </div>
              <div class="pos-menu__grid">
                <!-- Sin menú cargado -->
                <div v-if="allItems.length === 0 && !menuLoading" style="grid-column:1/-1">
                  <div class="empty-state">
                    <div class="icon">☕</div>
                    Sin menú cargado.<br>
                    Ve a <strong>CAJA → Menú</strong> y presiona <strong>Recargar menú</strong>.
                  </div>
                </div>
                <!-- Cargando -->
                <div v-if="menuLoading" style="grid-column:1/-1">
                  <div class="empty-state">
                    <div class="icon"><span class="spinner"></span></div>
                    Cargando menú de Polotab…
                  </div>
                </div>
                <!-- Items -->
                <div v-for="item in filteredItems" :key="item.id" class="item-card" @click="openItemModal(item)">
                  <span class="item-card__cat">{{item.menuName}}</span>
                  <span class="item-card__name">{{item.name}}</span>
                  <span class="item-card__price" :class="{specialty: item.basePrice === null}">
                    {{item.basePrice !== null ? '$' + item.basePrice : 'Precio especial'}}
                  </span>
                  <span v-if="cartQty(item.id)" class="item-card__badge">{{cartQty(item.id)}}</span>
                </div>
                <div v-if="allItems.length > 0 && filteredItems.length === 0" style="grid-column:1/-1">
                  <div class="empty-state"><div class="icon">🔍</div>Sin resultados</div>
                </div>
              </div>
            </div>

            <!-- CARRITO -->
            <div class="pos-cart">
              <div class="pos-cart__header">
                <span class="pos-cart__title">COMANDA</span>
                <span class="pos-cart__count">{{cart.length}} productos</span>
              </div>
              <!-- Mesa selector -->
              <div class="cart-mesa-bar">
                <span class="mesa-chip" :class="{active: activeMesa.id===null}" @click="activeMesa.id=null; activeMesa.customerName=''">Sin destino</span>
                <span v-for="m in MESAS" :key="m.id" class="mesa-chip" :class="{active: activeMesa.id===m.id}" @click="activeMesa.id=m.id; activeMesa.customerName=''">{{m.label}}</span>
                <span class="mesa-chip" :class="{active: activeMesa.id==='llevar'}" @click="activeMesa.id='llevar'">Para Llevar</span>
                <template v-if="activeMesa.id==='llevar'">
                  <input class="cart-llevar-input" v-model="activeMesa.customerName" placeholder="Nombre del cliente…">
                </template>
              </div>
              <div class="pos-cart__note">
                <textarea class="cart-note-input" v-model="orderNote" placeholder="Notas de la orden…" rows="2"></textarea>
              </div>
              <div class="pos-cart__items">
                <div v-if="cart.length === 0" class="cart-empty">Sin productos.<br>Toca un item del menú para agregar.</div>
                <div v-for="(ci, idx) in cart" :key="ci.uid" class="cart-item">
                  <div class="cart-item__qty-ctrl">
                    <button class="qty-btn del-btn" @click="removeFromCart(idx)">×</button>
                    <button class="qty-btn" @click="changeQty(idx,-1)">−</button>
                    <span class="cart-item__qty">{{ci.qty}}</span>
                    <button class="qty-btn" @click="changeQty(idx,1)">+</button>
                  </div>
                  <div class="cart-item__info">
                    <div class="cart-item__name">{{ci.name}}</div>
                    <div v-if="ci.note" class="cart-item__note">{{ci.note}}</div>
                  </div>
                  <span class="cart-item__price">${{ci.price * ci.qty}}</span>
                </div>
              </div>
              <div class="pos-cart__footer">
                <div class="cart-summary">
                  <div class="cart-sum-row"><span>Subtotal</span><span>${{cartTotal}}</span></div>
                  <div class="cart-sum-row total"><span>TOTAL</span><span>${{cartTotal}}</span></div>
                </div>
                <button class="btn-guardar" :disabled="!cart.length || !session.open" @click="saveComanda">
                  GUARDAR EN {{activeMesa.id ? (activeMesa.id === 'llevar' ? 'PARA LLEVAR' : MESAS.find(m=>m.id===activeMesa.id)?.label ?? activeMesa.id) : 'MESA'}}
                </button>
                <button class="btn-cobrar" :disabled="!cart.length || !session.open" @click="openPayModal">COBRAR ${{cartTotal}}</button>
                <button class="btn-clear" v-if="cart.length" @click="clearCart">LIMPIAR COMANDA</button>
              </div>
            </div>
          </div>
        </template>

        <!-- ══ MESAS ══ -->
        <template v-else-if="activeTab==='mesas'">
          <div class="mesas-view">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
              <h2 style="font-size:1rem;letter-spacing:.12em;font-weight:700">MESAS Y CUENTAS ABIERTAS</h2>
              <span style="font-size:.75rem;color:var(--muted)">{{openOrders.length}} cuenta{{openOrders.length!==1?'s':''}} abierta{{openOrders.length!==1?'s':''}}</span>
            </div>
            <div v-if="openOrders.length===0" class="empty-state"><div class="icon">🪑</div>Sin cuentas abiertas.<br>Agrega productos y toca "GUARDAR EN MESA".</div>
            <div v-else class="mesas-grid">
              <div v-for="oo in openOrders" :key="oo.id" class="mesa-card occupied">
                <div class="mesa-card__label">
                  {{oo.mesaLabel}}
                  <span class="mesa-badge-occupied">ABIERTA</span>
                </div>
                <div class="mesa-card__info">
                  <div v-if="oo.customerName">👤 {{oo.customerName}}</div>
                  <div>🕐 {{oo.openedAt}}</div>
                  <div>📦 {{oo.items.length}} producto{{oo.items.length!==1?'s':''}}</div>
                  <div v-if="oo.note" style="margin-top:.2rem;color:var(--text)">📝 {{oo.note}}</div>
                </div>
                <div class="mesa-card__total">${{oo.items.reduce((s,c)=>s+(c.price+(c.extraNotePrice||0))*c.qty,0)}}</div>
                <div class="mesa-card__actions">
                  <button class="mesa-card__btn resume" @click="loadOpenOrder(oo)">+ AGREGAR</button>
                  <button class="mesa-card__btn pay" @click="loadAndPay(oo)">COBRAR</button>
                  <button class="mesa-card__btn del" @click="deleteOpenOrder(oo.id)">✕</button>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- ══ ÓRDENES ══ -->
        <template v-else-if="activeTab==='orders'">
          <div class="orders-view">
            <div class="orders-toolbar">
              <input type="date" class="date-input" v-model="filterDate">
              <button class="btn-secondary" @click="filterDate=todayStr">HOY</button>
              <div class="orders-kpi">
                <div class="kpi-chip"><span>ÓRDENES</span><strong>{{dayOrders.length}}</strong></div>
                <div class="kpi-chip"><span>VENTAS</span><strong>${{dayTotal}}</strong></div>
                <div class="kpi-chip"><span>TICKET PROM.</span><strong>${{dayAvg}}</strong></div>
                <div class="kpi-chip"><span>CANCELADAS</span><strong>{{dayCancelled}}</strong></div>
              </div>
            </div>
            <div class="orders-table-wrap">
              <div v-if="dayOrders.length === 0" class="empty-state"><div class="icon">📋</div>No hay órdenes para esta fecha.</div>
              <table v-else class="orders-table">
                <thead><tr>
                  <th>#</th><th>HORA</th><th>DEST.</th><th>PRODUCTOS</th><th>PAGO</th><th>TOTAL</th><th>NOTAS</th><th></th>
                </tr></thead>
                <tbody>
                  <tr v-for="(o,i) in dayOrders" :key="o.id" :class="{cancelled: o.cancelled}">
                    <td class="text-muted">{{String(i+1).padStart(2,'0')}}</td>
                    <td>{{o.timeStr}}</td>
                    <td class="text-muted" style="font-size:.72rem">{{o.mesa || '—'}}</td>
                    <td>
                      <div class="order-items-detail">
                        <div v-for="ci in o.items" :key="ci.uid">{{ci.qty}}× {{ci.name}} (${{(ci.price + (ci.extraNotePrice||0)) * ci.qty}})</div>
                      </div>
                    </td>
                    <td>
                      <span v-if="o.cancelled" class="badge badge-cancelled">CANCELADA</span>
                      <span v-else class="badge" :class="'badge-' + o.payment.toLowerCase()">{{o.payment}}</span>
                    </td>
                    <td><strong class="text-amber">${{o.total}}</strong></td>
                    <td class="text-muted" style="font-size:.72rem">{{o.note || '—'}}</td>
                    <td style="display:flex;gap:.3rem;flex-wrap:wrap">
                      <button v-if="!o.cancelled" class="btn-cancel-order" @click="changeOrderPayment(o)">💳</button>
                      <button v-if="!o.cancelled" class="btn-cancel-order" @click="cancelOrder(o.id)">Cancelar</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- ══ REPORTES ══ -->
        <template v-else-if="activeTab==='reports'">
          <div class="reports-view">
            <div class="reports-header">

                WhatsApp

              <div class="kpi-card"><div class="kpi-card__label">Tarjeta + Transfer.</div><div class="kpi-card__val">${{payTotals.Tarjeta + payTotals.Transferencia}}</div></div>

                    <span class="bar-label" :title="p.name">{{p.name}}</span>
                    <div class="bar-track"><div class="bar-fill" :style="{width: (p.qty/topProducts[0].qty*100)+'%'}"></div></div>
                    <span class="bar-val">{{p.qty}}</span>
                  </div>
                </div>
              </div>
              <div class="report-card">

                  </div>

              </div>
              <div class="report-card">
                <div class="report-card__title">MÉTODOS DE PAGO</div>

                    <span class="pay-name">{{pm.name}}</span>
                    <span class="pay-pct">{{Math.round((payTotals[pm.name]||0)/dayTotal*100)||0}}%</span>
                    <span class="pay-amt">${{payTotals[pm.name]||0}}</span>
                  </div>
                </div>
              </div>
              <div class="report-card">
                <div class="report-card__title">INGRESOS POR CATEGORÍA</div>
                <div v-if="topCats.length===0" class="empty-state" style="padding:1rem">Sin datos</div>
                <div v-else class="bar-chart">

                    <div class="bar-track"><div class="bar-fill" :style="{width: (c.total/topCats[0].total*100)+'%', background:'var(--amber)'}"></div></div>

          </div>

        <!-- ══ CAJA ══ -->
        <template v-else-if="activeTab==='caja'">
          <div class="caja-view">

            <!-- Estado -->
            <div class="caja-section">
              <div class="caja-section__title">Estado de caja</div>
              <div class="session-status-big">

              <template v-else>

              </template>
            </div>

            <!-- Arqueo -->
            <div class="caja-section" v-if="session.open">
              <div class="caja-section__title">

                <button class="btn-denom-reset" @click="resetDenoms" title="Limpiar conteo">↺ Limpiar</button>

              <div class="denom-section">
