                <div class="denom-rows">
                  <div v-for="d in DENOMS.filter(d=>d.group==='Monedas')" :key="d.key" class="denom-row">
                    <span class="denom-label">{{d.label}}</span>
                    <span class="denom-x">×</span>
                    <input class="denom-input" type="number" min="0" step="1"
                      v-model.number="denomCounts[d.key]" placeholder="0">
                    <span class="denom-eq">=</span>
                    <span class="denom-sub" :class="{zero: !(denomCounts[d.key]>0)}">
                      ${{denomFmt((denomCounts[d.key]||0)*d.val)}}
                    </span>
                  </div>
                </div>
                <!-- BILLETES -->
                <div class="denom-group-label" style="margin-top:.5rem">💵 Billetes</div>
                <div class="denom-rows">
                  <div v-for="d in DENOMS.filter(d=>d.group==='Billetes')" :key="d.key" class="denom-row">
                    <span class="denom-label">{{d.label}}</span>
                    <span class="denom-x">×</span>
                    <input class="denom-input" type="number" min="0" step="1"
                      v-model.number="denomCounts[d.key]" placeholder="0">
                    <span class="denom-eq">=</span>
                    <span class="denom-sub" :class="{zero: !(denomCounts[d.key]>0)}">
                      ${{(denomCounts[d.key]||0)*d.val}}
                    </span>
                  </div>
                </div>
                <!-- TOTAL CONTADO -->
                <div class="denom-total-row">
                  <span class="denom-total-label">TOTAL EN CAJA</span>
                  <span class="denom-total-val">${{denominationTotal.toFixed(2)}}</span>
                </div>
              </div>

              <!-- RESUMEN esperado vs real -->
              <table class="arqueo-table" style="margin-top:1rem;margin-bottom:.5rem">
                <tbody>
                  <tr><td>Fondo inicial</td><td>${{session.opening}}</td></tr>
                  <tr><td>Ventas efectivo (hoy)</td><td>+${{todayEfectivo}}</td></tr>
                  <tr v-if="todayEgresosTotal>0">
                    <td style="color:var(--red)">Egresos (hoy)</td>
                    <td style="color:var(--red)">−${{todayEgresosTotal.toFixed(2)}}</td>
                  </tr>
                  <tr>
                    <td><strong>Esperado en caja</strong></td>
                    <td><strong>${{arqueoEsperado.toFixed(2)}}</strong></td>
                  </tr>
                  <tr v-if="denomHasData">
                    <td>Contado físicamente</td>
                    <td><strong style="color:var(--amber)">${{denominationTotal.toFixed(2)}}</strong></td>
                  </tr>
                  <tr v-if="denomHasData">
                    <td><strong>Diferencia</strong></td>
                    <td>
                      <strong :class="arqueoDiff>=0?'arqueo-diff-pos':'arqueo-diff-neg'">
                        {{arqueoDiff>=0?'+':''}}${{arqueoDiff}}
                      </strong>
                    </td>
                  </tr>
                </tbody>
              </table>

              <!-- NOTA DE DISCREPANCIA (visible solo cuando hay conteo) -->
              <template v-if="denomHasData">
                <div class="disc-note-label">
                  <template v-if="arqueoDiff < 0">⚠️ FALTANTE — NOTA DE DISCREPANCIA</template>
                  <template v-else-if="arqueoDiff > 0">⚠️ SOBRANTE — NOTA DE DISCREPANCIA</template>
                  <template v-else>✅ OBSERVACIONES DEL CIERRE</template>
                </div>
                <textarea class="disc-note-input" v-model="discrepancyNote" rows="2"
                  :placeholder="arqueoDiff < 0
                    ? 'Explica por qué faltan $'+Math.abs(arqueoDiff)+'… (cambio mal dado, billete perdido, etc.)'
                    : arqueoDiff > 0
                      ? 'Explica por qué sobran $'+arqueoDiff+'… (pago no registrado, etc.)'
                      : 'Todo cuadra. Agrega una observación si lo deseas…'">
                </textarea>
              </template>
            </div>

            <!-- ══ MENÚ ══ -->
            <div class="caja-section">
              <div class="caja-section__title">Menú</div>
              <p style="font-size:.78rem;color:var(--muted);margin-bottom:.9rem;line-height:1.6">
                El menú se sincroniza automáticamente cada día desde Polotab.<br>
                Usa el botón para cargar la versión más reciente ahora mismo.
              </p>
              <div v-if="menuError" class="sync-error">⚠️ {{menuError}}</div>
              <div class="caja-btns">
                <button class="btn-primary" @click="loadMenu" :disabled="menuLoading">
                  <span v-if="menuLoading" class="spinner" style="width:14px;height:14px;border-width:2px;margin-right:.4rem"></span>
                  {{menuLoading ? 'CARGANDO…' : 'RECARGAR MENÚ'}}
                </button>
                <span v-if="menuCachedAt" class="sync-info">
                  Último sync: <strong>{{menuCachedAt}}</strong><br>
                  {{allItems.length}} productos · {{menus.length}} categorías
                </span>
                <span v-else class="sync-info" style="color:var(--red)">Sin menú cargado</span>
              </div>
            </div>

            <!-- Cambiar PIN -->
            <!-- Egresos -->
            <div class="caja-section">
              <div class="caja-section__title">Egresos de caja</div>
              <div class="caja-form" style="margin-bottom:.75rem">
                <div class="form-row">
                  <span class="form-label">Monto</span>
                  <input class="form-input" v-model.number="egresoForm.amount" type="number" placeholder="$0.00" style="max-width:140px" min="0" step="0.5">
                </div>
                <div class="form-row">
                  <span class="form-label">Descripción</span>
                  <input class="form-input" v-model="egresoForm.desc" placeholder="Ej: basura, limpieza, insumos…">
                </div>
              </div>
              <div class="caja-btns" style="margin-bottom:.75rem">
                <button class="btn-primary" @click="saveEgreso" :disabled="!egresoForm.amount || !egresoForm.desc.trim()">REGISTRAR EGRESO</button>
              </div>
              <div v-if="todayEgresos.length===0" style="font-size:.78rem;color:var(--muted)">Sin egresos hoy.</div>
              <div v-else class="egresos-list">
                <div v-for="e in todayEgresos" :key="e.id" class="egreso-row">
                  <span class="egreso-row__time">{{e.time}}</span>
                  <span class="egreso-row__desc">{{e.desc}}</span>
                  <span class="egreso-row__amt">−${{e.amount}}</span>
                </div>
                <div style="display:flex;justify-content:flex-end;font-size:.8rem;font-weight:700;color:var(--red);padding:.4rem .6rem">
                  Total egresos: −${{todayEgresos.reduce((s,e)=>s+e.amount,0).toFixed(2)}}
                </div>
              </div>
            </div>

            <div class="caja-section">
              <div class="caja-section__title">Seguridad</div>
              <div class="caja-form">
                <div class="form-row"><span class="form-label">PIN actual</span><input class="form-input" type="password" v-model="pinChange.current" maxlength="4" placeholder="••••" style="max-width:120px"></div>
                <div class="form-row"><span class="form-label">Nuevo PIN</span><input class="form-input" type="password" v-model="pinChange.nuevo" maxlength="4" placeholder="••••" style="max-width:120px"></div>
                <div class="form-row"><span class="form-label">Confirmar</span><input class="form-input" type="password" v-model="pinChange.confirm" maxlength="4" placeholder="••••" style="max-width:120px"></div>
              </div><br>
              <div class="caja-btns"><button class="btn-primary" @click="changePin">CAMBIAR PIN</button></div>
            </div>

            <!-- Datos -->
            <div class="caja-section">
              <div class="caja-section__title">Datos</div>
              <div class="caja-btns">
                <button class="btn-secondary" @click="exportJSON">EXPORTAR JSON</button>
                <button class="btn-secondary" @click="exportCSV">EXPORTAR CSV</button>
                <button class="btn-danger" @click="confirmClearData">BORRAR ÓRDENES DEL DÍA</button>
              </div>
            </div>

            <!-- Historial -->
            <div class="caja-section">
              <div class="caja-section__title">Historial de turnos</div>
              <div v-if="allSessions.length===0" class="text-muted" style="font-size:.8rem">Sin historial.</div>
              <div v-else class="sessions-history">
                <div v-for="s in allSessions.slice().reverse()" :key="s.id" class="session-hist-item">
                  <div><span>APERTURA</span><strong>{{s.openedAt}}</strong></div>
                  <div><span>CIERRE</span><strong>{{s.closedAt || 'Activo'}}</strong></div>
                  <div><span>VENTAS</span><strong>${{s.totalSales||0}}</strong></div>
                  <div><span>FONDO</span><strong>${{s.opening}}</strong></div>
                  <div><span>EFECTIVO</span><strong>${{s.totalEfectivo||0}}</strong></div>
                  <div><span>ÓRDENES</span><strong>{{s.orderCount||0}}</strong></div>
                  <template v-if="s.arqueoDiff !== null && s.arqueoDiff !== undefined">
                    <div><span>CONTADO</span><strong style="color:var(--amber)">${{s.denominationTotal}}</strong></div>
                    <div><span>DIFERENCIA</span>
                      <strong :style="{color: s.arqueoDiff>=0?'var(--green-light)':'#e74c3c'}">
                        {{s.arqueoDiff>=0?'+':''}}${{s.arqueoDiff}}
                      </strong>
                    </div>
                  </template>
                  <div v-if="s.discrepancyNote" style="grid-column:1/-1;font-size:.65rem;color:var(--muted);padding:.2rem 0;border-top:1px solid var(--border)">📝 {{s.discrepancyNote}}</div>
                </div>
              </div>
            </div>

          </div>
        </template>

      </div><!-- /view -->
    </div><!-- /app -->

    <!-- ══ MODAL ITEM + MODIFICADORES ══ -->
    <div class="modal-backdrop" v-if="itemModal.show" @click.self="itemModal.show=false">
      <div class="modal item-modal">
        <div class="item-modal__header">
          <h3>{{itemModal.item?.name}}</h3>
          <button class="item-modal__close" @click="itemModal.show=false">×</button>
        </div>
        <div class="item-modal__meta">
          <template v-if="itemModal.item?.basePrice !== null">
            Precio base: <strong>${{itemModal.item?.basePrice}}</strong>
          </template>
          <template v-else>
            <span style="color:var(--amber);font-weight:600">☕ Café de especialidad</span> — precio a confirmar
          </template>
        </div>

        <!-- Precio especial (specialty) -->
        <template v-if="itemModal.item?.basePrice === null">
          <div class="item-modal__note-label">PRECIO DE VENTA</div>
          <input class="item-modal__note-input" v-model.number="itemModal.specialtyPrice" type="number" placeholder="$0" @keyup.enter="confirmItemModal">
        </template>

        <!-- Grupos de modificadores de Polotab -->
        <template v-if="itemModal.item?.basePrice !== null">
          <div v-for="mg in activeModGroups" :key="mg.id" class="mod-group">
            <div class="mod-group__label">
              {{mg.name}}
              <span v-if="mg.quantityConstraint?.min > 0" class="mod-required">· REQUERIDO</span>
              <span v-if="mg.quantityConstraint?.max > 1" class="mod-hint">(hasta {{mg.quantityConstraint.max}})</span>
            </div>
            <div class="mod-chips">
              <!-- Radio: max === 1 → solo una opción; null/undefined → sin límite (multi) -->
              <template v-if="(mg.quantityConstraint?.max ?? Infinity) === 1">
                <div v-for="mi in mg.modifierItems" :key="mi.id"
                  class="mod-chip"
                  :class="{selected: itemModal.selections[mg.id] === mi.id}"
                  @click="itemModal.selections[mg.id] = mi.id">
                  {{mi.name}}<span v-if="mi.prices?.[0]?.amount" class="extra">+${{mi.prices[0].amount}}</span>
                </div>
              </template>
              <!-- Multi: max > 1 → varias opciones -->
              <template v-else>
                <div v-for="mi in mg.modifierItems" :key="mi.id"
                  class="mod-chip"
                  :class="{selected: (itemModal.selections[mg.id] || []).includes(mi.id)}"
                  @click="toggleMultiMod(mg, mi)">
                  {{mi.name}}<span v-if="mi.prices?.[0]?.amount" class="extra">+${{mi.prices[0].amount}}</span>
                </div>
              </template>
            </div>
          </div>
        </template>

        <div class="item-modal__divider"></div>

        <div class="item-modal__note-label">NOTAS ADICIONALES</div>
        <input class="item-modal__note-input" v-model="itemModal.note" placeholder="Ej: sin hielo, extra shots, separar en 2 vasos…">
        <div class="extra-price-row">
          <label>COSTO EXTRA</label>
          <input class="extra-price-input" v-model.number="itemModal.extraNotePrice" type="number" min="0" step="0.5" placeholder="+$0">
          <span style="font-size:.72rem;color:var(--muted)">por modificación manual</span>
        </div>

        <div class="item-modal__qty-row">
          <button class="modal-qty-btn" @click="itemModal.qty = Math.max(1, itemModal.qty-1)">−</button>
          <span class="modal-qty-val">{{itemModal.qty}}</span>
          <button class="modal-qty-btn" @click="itemModal.qty++">+</button>
          <div class="item-modal__total">
            ${{itemModalTotal}}
            <small>total{{itemModal.qty > 1 ? ' (×'+itemModal.qty+')' : ''}}</small>
          </div>
        </div>

        <div class="modal-btns">
          <button class="modal-btn cancel" @click="itemModal.show=false">Cancelar</button>
          <button class="modal-btn confirm" @click="confirmItemModal">AGREGAR AL CARRITO</button>
        </div>
      </div>
    </div>

    <!-- ══ PAYMENT OVERLAY (fullscreen) ══ -->
    <div class="pay-overlay" v-if="payModal.show">
      <button class="pay-overlay__back" @click="payModal.show=false">← Volver</button>

      <!-- Step 1: selección de método -->
      <template v-if="payModal.step==='method'">
        <div class="pay-overlay__title">¿Cómo va a pagar?</div>
        <div v-if="payModal.mesaLabel" class="pay-overlay__mesa">{{payModal.mesaLabel}}</div>
        <div class="pay-overlay__total">${{payModal.total}}</div>
        <div class="pay-methods">
          <button class="pay-method-btn" @click="selectPayMethod('Efectivo')">
            <span class="pay-method-icon">💵</span>EFECTIVO
          </button>
          <button class="pay-method-btn" @click="selectPayMethod('Tarjeta')">
            <span class="pay-method-icon">💳</span>TARJETA
          </button>
          <button class="pay-method-btn" @click="selectPayMethod('Transferencia')">
            <span class="pay-method-icon">📲</span>TRANSFERENCIA
          </button>
        </div>
      </template>

      <!-- Step 2: efectivo → cambio -->
      <template v-else-if="payModal.step==='cash'">
        <div class="pay-overlay__title">Efectivo recibido</div>
        <div class="pay-overlay__total">${{payModal.total}}</div>
        <div class="pay-cash-section">
          <div class="pay-cash-label">¿Cuánto te dieron?</div>
          <input class="pay-cash-input" v-model.number="payModal.cashGiven" type="number" min="0" placeholder="0" autofocus ref="cashInput">
          <template v-if="payModal.cashGiven > 0">
            <div class="pay-change-block">
              <div class="pay-change-label">{{payChangeVal >= 0 ? 'Cambio' : 'Falta'}}</div>
              <div class="pay-change-val" :class="{short: payChangeVal < 0}">${{Math.abs(payChangeVal)}}</div>
            </div>
          </template>
        </div>
        <button class="pay-confirm-btn" :disabled="payModal.cashGiven > 0 && payChangeVal < 0" @click="confirmPayment">
          CONFIRMAR COBRO
        </button>
        <button class="pay-overlay__back" style="position:static;margin-top:-.5rem" @click="payModal.step='method'">← Cambiar método</button>
      </template>

      <!-- Step 2b: tarjeta/transferencia → confirmar -->
      <template v-else-if="payModal.step==='confirm'">
        <div class="pay-overlay__title">Confirmar cobro</div>
        <div class="pay-overlay__total">${{payModal.total}}</div>
        <div style="font-size:1.1rem;color:var(--muted);text-align:center">
          {{ payModal.method === 'Tarjeta' ? '💳 Tarjeta' : '📲 Transferencia' }}
        </div>
        <button class="pay-confirm-btn" @click="confirmPayment">CONFIRMAR COBRO</button>
        <button class="pay-overlay__back" style="position:static;margin-top:-.5rem" @click="payModal.step='method'">← Cambiar método</button>
      </template>
    </div>

    <!-- ══ MODAL CAMBIAR MÉTODO DE PAGO ══ -->
    <div class="modal-backdrop" v-if="changePayModal.show" @click.self="changePayModal.show=false">
      <div class="modal">
        <h3>CAMBIAR MÉTODO DE PAGO</h3>
        <p>Orden #{{changePayModal.order?.id}} · <strong style="color:var(--amber)">${{changePayModal.order?.total}}</strong></p>
        <div style="display:flex;gap:.5rem;margin-bottom:1rem">
          <button v-for="m in ['Efectivo','Tarjeta','Transferencia']" :key="m"
            class="btn-secondary" style="flex:1;font-size:.78rem"
            :style="changePayModal.selected===m ? 'border-color:var(--green);color:var(--green-light)' : ''"
            @click="changePayModal.selected=m">{{m}}</button>
        </div>
        <div class="modal-btns">
          <button class="modal-btn cancel" @click="changePayModal.show=false">Cancelar</button>
          <button class="modal-btn confirm" @click="applyChangePayment">APLICAR</button>
        </div>
      </div>
    </div>

    <!-- ══ MODAL CERRAR CAJA ══ -->
    <div class="modal-backdrop" v-if="closeModal.show" @click.self="closeModal.show=false">
      <div class="modal">
        <h3>CERRAR CAJA</h3>
        <p>¿Confirmas el cierre del turno? Se guardará en el historial.</p>
        <div style="background:var(--surface2);border-radius:8px;padding:.75rem;margin-bottom:1rem;font-size:.82rem">
          <div style="display:flex;justify-content:space-between;margin-bottom:.3rem"><span class="text-muted">Ventas del turno</span><strong>${{todaySales}}</strong></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.3rem"><span class="text-muted">Efectivo ventas</span><strong>${{todayEfectivo}}</strong></div>
          <div v-if="todayEgresosTotal>0" style="display:flex;justify-content:space-between;margin-bottom:.3rem"><span class="text-muted">Egresos</span><strong style="color:var(--red)">−${{todayEgresosTotal.toFixed(2)}}</strong></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.3rem"><span class="text-muted">Esperado en caja</span><strong>${{arqueoEsperado.toFixed(2)}}</strong></div>
          <template v-if="denomHasData">
            <div style="height:1px;background:var(--border);margin:.4rem 0"></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
              <span class="text-muted">Contado físicamente</span>
              <strong style="color:var(--amber)">${{denominationTotal.toFixed(2)}}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
              <span class="text-muted">Diferencia</span>
              <strong :style="{color: arqueoDiff>=0?'var(--green-light)':'#e74c3c'}">
                {{arqueoDiff>=0?'+':''}}${{arqueoDiff}}
                {{arqueoDiff===0 ? '✅' : arqueoDiff<0 ? '⚠️ FALTANTE' : '⚠️ SOBRANTE'}}
              </strong>
            </div>
            <div v-if="discrepancyNote.trim()" style="margin-top:.35rem;padding:.4rem .5rem;background:var(--surface3);border-radius:6px;font-size:.75rem;color:var(--muted);line-height:1.4">
              📝 {{discrepancyNote}}
            </div>
          </template>
          <div v-else style="margin-top:.3rem;font-size:.72rem;color:var(--muted)">
            ⚠️ No realizaste el conteo de denominaciones en Arqueo.
          </div>
          <div style="height:1px;background:var(--border);margin:.4rem 0"></div>
          <div style="display:flex;justify-content:space-between"><span class="text-muted">Órdenes</span><strong>{{todayOrderCount}}</strong></div>
        </div>
        <div class="modal-btns">
          <button class="modal-btn cancel" @click="closeModal.show=false">Cancelar</button>
          <button class="modal-btn confirm" style="background:var(--red)" @click="closeSession">CERRAR</button>
        </div>
      </div>
    </div>

    <!-- ══ MODAL CONFIRMACIÓN ══ -->
    <div class="modal-backdrop" v-if="confirmModal.show" @click.self="confirmModal.show=false">
      <div class="modal">
        <h3>{{confirmModal.title}}</h3>
        <p>{{confirmModal.body}}</p>
        <div class="modal-btns">
          <button class="modal-btn cancel" @click="confirmModal.show=false">Cancelar</button>
          <button class="modal-btn confirm" style="background:var(--red)" @click="confirmModal.action(); confirmModal.show=false">CONFIRMAR</button>
        </div>
      </div>
    </div>

  </template>

  <!-- TOASTS -->
  <div class="toast-container">
    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type">
      <span>{{t.icon}}</span><span>{{t.msg}}</span>
    </div>
  </div>

</div><!-- /app -->

<script>
const { createApp, ref, computed, watch, onMounted, reactive } = Vue

createApp({
  setup() {

    /* ══════════════════════════════
       LOCK
    ══════════════════════════════ */
    const unlocked = ref(false)
    const pinInput = ref('')
    const pinError = ref('')
    function getPin() { return localStorage.getItem('lv_pin') || '1234' }
    function pinPress(k) {
      pinError.value = ''
      if (k === 'del') { pinInput.value = pinInput.value.slice(0, -1); return }
      if (k === 'enter') { checkPin(); return }
      if (pinInput.value.length >= 4) return
      pinInput.value += k
      if (pinInput.value.length === 4) setTimeout(checkPin, 100)
    }
    function checkPin() {
      if (pinInput.value === getPin()) { unlocked.value = true }
      else {
        pinError.value = 'PIN incorrecto'
        setTimeout(() => { pinInput.value = ''; pinError.value = '' }, 700)
      }
    }

    /* ══════════════════════════════
       NAVIGATION
    ══════════════════════════════ */
    const tabs = [
      { id: 'pos', label: 'COMANDAR' },
      { id: 'mesas', label: 'MESAS' },
      { id: 'orders', label: 'ÓRDENES' },
      { id: 'reports', label: 'REPORTES' },
      { id: 'caja', label: 'CAJA' },
    ]
    const activeTab = ref('pos')

    /* ══════════════════════════════
       POLOTAB — MENÚ
    ══════════════════════════════ */
    const menus = ref([])   // datos de lv-menu.json
    const mgMap = ref({})
    const menuLoading = ref(false)
    const menuError = ref('')
    const menuCachedAt = ref('')

    // Todos los items aplanados
    const allItems = computed(() =>
      menus.value.flatMap(m => (m.items || []).map(item => ({ ...item, menuName: item.menuName || m.name })))
    )

    // Categorías para los botones de filtro
    const categories = computed(() => ['TODO', ...menus.value.map(m => m.name)])

    /* ─── CARGAR lv-menu.json (mismo origen, sin CORS) ─── */
    async function loadMenu() {
      menuLoading.value = true
      menuError.value = ''
      try {
        const res = await fetch('./lv-menu.json?t=' + Date.now())
        if (!res.ok) throw new Error(`HTTP ${res.status}`)
        const data = await res.json()

        if (!data.menus?.length) throw new Error('El menú está vacío. ¿Ya corriste el GitHub Action?')

        menus.value = data.menus
        mgMap.value = data.mgMap ?? {}

        // Mostrar fecha del último sync de Polotab (la que grabó el Action)
        const polotabTs = data.syncedAt
          ? new Date(data.syncedAt).toLocaleString('es-MX')
          : new Date().toLocaleString('es-MX')
        menuCachedAt.value = polotabTs

        // Guardar en localStorage para disponibilidad offline
        localStorage.setItem('lv_menu_cache', JSON.stringify({ menus: data.menus, mgMap: data.mgMap, cachedAt: polotabTs }))

        toast(`Menú cargado: ${data.menus.length} categorías · ${allItems.value.length} productos`, 'success', '☕')
      } catch (e) {
        menuError.value = e.message
        toast('Error al cargar menú: ' + e.message, 'error', '⚠️')
      } finally {
        menuLoading.value = false
      }
    }

    /* ══════════════════════════════
       POS — FILTRADO
    ══════════════════════════════ */
    const activeCat = ref('TODO')
    const searchQ = ref('')

    const filteredItems = computed(() => {
      let items = allItems.value
      if (activeCat.value !== 'TODO') items = items.filter(i => i.menuName === activeCat.value)
      if (searchQ.value.trim()) {
        const q = searchQ.value.toLowerCase()
        items = items.filter(i => i.name.toLowerCase().includes(q))
      }
      return items
    })

    function cartQty(itemId) {
      return cart.value.filter(c => c.itemId === itemId).reduce((s, c) => s + c.qty, 0)
    }

    /* ══════════════════════════════
       ITEM MODAL + MODIFICADORES
    ══════════════════════════════ */
    const itemModal = reactive({
      show: false, item: null, qty: 1, note: '', extraNotePrice: 0, specialtyPrice: null,
      selections: {}, // groupId → itemId (radio) | itemId[] (multi)
    })

    // Modifier groups activos para el item actual
    const activeModGroups = computed(() => itemModal.item?.modifierGroups ?? [])

    // Extras del modal (suma de precios de modificadores seleccionados)
    const itemModalExtras = computed(() => {
      let extra = 0
      for (const mg of activeModGroups.value) {
        const isRadio = (mg.quantityConstraint?.max ?? Infinity) === 1
        const sel = itemModal.selections[mg.id]
        if (isRadio) {
          if (sel) {
            const mi = (mg.modifierItems ?? []).find(m => m.id === sel)
            extra += mi?.prices?.[0]?.amount ?? 0
          }
        } else {
          for (const id of (sel ?? [])) {
            const mi = (mg.modifierItems ?? []).find(m => m.id === id)
            extra += mi?.prices?.[0]?.amount ?? 0
          }
        }
      }
      return extra
    })

    const itemModalTotal = computed(() => {
      const base = itemModal.item?.basePrice !== null
        ? (itemModal.item?.basePrice ?? 0)
        : (itemModal.specialtyPrice ?? 0)
      return (base + itemModalExtras.value + (itemModal.extraNotePrice || 0)) * itemModal.qty
    })

    function openItemModal(item) {
      itemModal.item = item
      itemModal.qty = 1
      itemModal.note = ''
      itemModal.extraNotePrice = 0
      itemModal.specialtyPrice = null
      // Inicializar selecciones con defaults de Polotab
      const sels = {}
      for (const mg of (item.modifierGroups ?? [])) {
        const isRadio = (mg.quantityConstraint?.max ?? Infinity) === 1
        if (isRadio) {
          // Siempre empezar sin selección
          sels[mg.id] = null
        } else {
          sels[mg.id] = [] // Multi: empieza vacío
        }
      }
      itemModal.selections = sels
      itemModal.show = true
    }

    function toggleMultiMod(mg, mi) {
      const sel = itemModal.selections[mg.id] ?? []
      const idx = sel.indexOf(mi.id)
      if (idx >= 0) {
        itemModal.selections[mg.id] = sel.filter(id => id !== mi.id)
      } else {
        const max = mg.quantityConstraint?.max ?? Infinity
        if (sel.length < max) {
          itemModal.selections[mg.id] = [...sel, mi.id]
        } else {
          toast(`Máximo ${max} opciones para "${mg.name}"`, 'info', 'ℹ️')
        }
      }
    }

    function confirmItemModal() {
      const item = itemModal.item
      if (!item) return
      // Specialty: requiere precio
      if (item.basePrice === null) {
        if (!itemModal.specialtyPrice || itemModal.specialtyPrice <= 0) {
          toast('Ingresa un precio válido', 'error', '⚠️'); return
        }
      }
      // Verificar grupos requeridos
      for (const mg of activeModGroups.value) {
        const min = mg.quantityConstraint?.min ?? 0
        if (min > 0) {
          const isRadio = (mg.quantityConstraint?.max ?? Infinity) === 1
          const sel = itemModal.selections[mg.id]
          const hasSelection = isRadio ? !!sel : (sel?.length ?? 0) >= min
          if (!hasSelection) {
            toast(`"${mg.name}" es requerido`, 'error', '⚠️'); return
          }
        }
      }

      const basePrice = item.basePrice !== null
        ? item.basePrice + itemModalExtras.value
        : itemModal.specialtyPrice

      // Construir nota automática con modificadores no-default
      const modNotes = []
      for (const mg of activeModGroups.value) {
        const isRadio = (mg.quantityConstraint?.max ?? Infinity) === 1
        const sel = itemModal.selections[mg.id]
        if (isRadio) {
          // Solo mostrar si no es el default
          if (sel && sel !== mg.defaultItemId) {
            const mi = (mg.modifierItems ?? []).find(m => m.id === sel)
            if (mi) modNotes.push(mi.name)
          }
        } else {
          for (const id of (sel ?? [])) {
            const mi = (mg.modifierItems ?? []).find(m => m.id === id)
            if (mi) modNotes.push(mi.name)
          }
        }
      }
      const extraNotePrice = itemModal.extraNotePrice || 0
      const extraNoteText = itemModal.note.trim()
      const fullNote = [...modNotes, extraNoteText ? (extraNotePrice > 0 ? `${extraNoteText} (+$${extraNotePrice})` : extraNoteText) : ''].filter(Boolean).join(' · ')
      const qty = itemModal.qty

      cart.value.push({
        uid: ++uidCounter,
        itemId: item.id,
        cat: item.menuName,
        name: item.name,
        price: basePrice,
        extraNotePrice,
        qty,
        note: fullNote,
      })
      itemModal.show = false
      toast(`${item.name} ×${qty} agregado`, 'success', '☕')
    }

    /* ══════════════════════════════
       CART
    ══════════════════════════════ */
    let uidCounter = 0
    const cart = ref([])
    const orderNote = ref('')
    const payMethod = ref('Efectivo')
    const cashReceived = ref(null)

    function changeQty(idx, delta) {
      const ci = cart.value[idx]
      ci.qty += delta
      if (ci.qty <= 0) cart.value.splice(idx, 1)
    }
    function removeFromCart(idx) { cart.value.splice(idx, 1) }
    function clearCart() { cart.value = []; orderNote.value = ''; cashReceived.value = null; payMethod.value = 'Efectivo' }

    const cartTotal = computed(() => cart.value.reduce((s, c) => s + (c.price + (c.extraNotePrice || 0)) * c.qty, 0))
    const change = computed(() => cashReceived.value ? cashReceived.value - cartTotal.value : 0)
    const canCobrar = computed(() => {
      if (!cart.value.length || !session.value.open) return false
      if (payMethod.value === 'Efectivo' && cashReceived.value && cashReceived.value < cartTotal.value) return false
      return true
    })

    function cobrar() {
      if (!canCobrar.value) return
      const now = new Date()
      orders.value.push({
        id: Date.now(),
        dateStr: now.toISOString().split('T')[0],
        timeStr: now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
        hour: now.getHours(),
        items: cart.value.map(c => ({ ...c })),
        total: cartTotal.value,
        payment: payMethod.value,
        note: orderNote.value,
        cashReceived: payMethod.value === 'Efectivo' ? (cashReceived.value ?? cartTotal.value) : null,
        change: payMethod.value === 'Efectivo' ? change.value : null,
        cancelled: false,
      })
      toast(`Cobrado $${cartTotal.value} — ${payMethod.value}`, 'success', '✅')
      clearCart()
    }

    /* ══════════════════════════════
       ÓRDENES / FILTROS
    ══════════════════════════════ */
    const orders = ref([])
    const todayStr = new Date().toISOString().split('T')[0]
    const filterDate = ref(todayStr)

    const dayOrders = computed(() => orders.value.filter(o => o.dateStr === filterDate.value))
    const dayTotal = computed(() => dayOrders.value.filter(o => !o.cancelled).reduce((s, o) => s + o.total, 0))
    const dayAvg = computed(() => {
      const valid = dayOrders.value.filter(o => !o.cancelled)
      return valid.length ? Math.round(dayTotal.value / valid.length) : 0
    })
    const dayCancelled = computed(() => dayOrders.value.filter(o => o.cancelled).length)

    function cancelOrder(id) {
      const o = orders.value.find(o => o.id === id)
      if (o) { o.cancelled = true; toast('Orden cancelada', 'info', 'ℹ️') }
    }

    /* ══════════════════════════════
       REPORTES
    ══════════════════════════════ */
    const todaySales = computed(() => orders.value.filter(o => o.dateStr === todayStr && !o.cancelled).reduce((s, o) => s + o.total, 0))
    const todayOrderCount = computed(() => orders.value.filter(o => o.dateStr === todayStr && !o.cancelled).length)
    const todayEfectivo = computed(() => orders.value.filter(o => o.dateStr === todayStr && !o.cancelled && o.payment === 'Efectivo').reduce((s, o) => s + o.total, 0))

    const payMethodsList = [
      { name: 'Efectivo', color: '#337958' },
      { name: 'Tarjeta', color: '#2980b9' },
      { name: 'Transferencia', color: '#C49A27' },
    ]
    const payTotals = computed(() => {
      const valid = dayOrders.value.filter(o => !o.cancelled)
      return {
        Efectivo: valid.filter(o => o.payment === 'Efectivo').reduce((s, o) => s + o.total, 0),
        Tarjeta: valid.filter(o => o.payment === 'Tarjeta').reduce((s, o) => s + o.total, 0),
        Transferencia: valid.filter(o => o.payment === 'Transferencia').reduce((s, o) => s + o.total, 0),
      }
    })

    const topProducts = computed(() => {
      const map = {}
      dayOrders.value.filter(o => !o.cancelled).forEach(o => {
        o.items.forEach(ci => {
          if (!map[ci.name]) map[ci.name] = { name: ci.name, qty: 0, revenue: 0 }
          map[ci.name].qty += ci.qty
          map[ci.name].revenue += ci.price * ci.qty
        })
      })
      return Object.values(map).sort((a, b) => b.qty - a.qty).slice(0, 8)
    })

    const topCats = computed(() => {
      const map = {}
      dayOrders.value.filter(o => !o.cancelled).forEach(o => {
        o.items.forEach(ci => {
          if (!map[ci.cat]) map[ci.cat] = { cat: ci.cat, total: 0 }
          map[ci.cat].total += ci.price * ci.qty
        })
      })
      return Object.values(map).sort((a, b) => b.total - a.total)
    })

    const hourlyData = computed(() => {
      const arr = Array(24).fill(0)
      dayOrders.value.filter(o => !o.cancelled).forEach(o => { arr[o.hour] += o.total })
      return arr
    })

    function shareReportWhatsApp() {
      const fecha = filterDate.value
      const ordenes = dayOrders.value.filter(o => !o.cancelled).length
      const canceladas = dayOrders.value.filter(o => o.cancelled).length
      const pt = payTotals.value

      let txt = `☕ *REPORTE SAINT LATTE — LEANDRO VALLE*\n`
      txt += `📅 ${fecha}\n\n`
      txt += `💰 *Ventas totales:* $${dayTotal.value}\n`
      txt += `🧾 *Órdenes:* ${ordenes}${canceladas ? ` (${canceladas} canceladas)` : ''}\n`
      txt += `📊 *Ticket promedio:* $${dayAvg.value}\n\n`

      txt += `*— Métodos de pago —*\n`
      txt += `💵 Efectivo:       $${pt.Efectivo || 0}\n`
      txt += `💳 Tarjeta:        $${pt.Tarjeta || 0}\n`
      txt += `📲 Transferencia:  $${pt.Transferencia || 0}\n`

      if (topProducts.value.length) {
        txt += `\n*— Top productos —*\n`
        topProducts.value.slice(0, 5).forEach((p, i) => {
          txt += `${i + 1}. ${p.name} ×${p.qty}\n`
        })
      }

      if (topCats.value.length) {
        txt += `\n*— Por categoría —*\n`
        topCats.value.forEach(c => {
          txt += `• ${c.cat}: $${c.total}\n`
        })
      }

      // Egresos del día
      const egresosHoy = todayEgresos.value
      if (egresosHoy.length) {
        txt += `\n*— Egresos —*\n`
        egresosHoy.forEach(e => { txt += `• ${e.desc}: −$${e.amount}\n` })
        txt += `Total egresos: −$${todayEgresosTotal.value.toFixed(2)}\n`
      }

      // Arqueo de denominaciones
      if (denomHasData.value) {
        txt += `\n*— Arqueo de caja —*\n`
        txt += `💰 Esperado:  $${arqueoEsperado.value.toFixed(2)}\n`
        txt += `🪙 Contado:   $${denominationTotal.value.toFixed(2)}\n`
        const diff = arqueoDiff.value
        txt += `${diff === 0 ? '✅' : '⚠️'} Diferencia: ${diff >= 0 ? '+' : ''}$${diff}${diff === 0 ? ' — CUADRA' : diff < 0 ? ' — FALTANTE' : ' — SOBRANTE'}\n`

        // Desglose monedas con qty > 0
        const coinsUsed = DENOMS.filter(d => d.group === 'Monedas' && (Number(denomCounts[d.key]) || 0) > 0)
        const billsUsed = DENOMS.filter(d => d.group === 'Billetes' && (Number(denomCounts[d.key]) || 0) > 0)
        if (coinsUsed.length) {
          txt += `\n🪙 *Monedas:*\n`
          coinsUsed.forEach(d => {
            const qty = Number(denomCounts[d.key])
            txt += `  ${d.label} × ${qty} = $${denomFmt(qty * d.val)}\n`
          })
        }
        if (billsUsed.length) {
          txt += `\n💵 *Billetes:*\n`
          billsUsed.forEach(d => {
            const qty = Number(denomCounts[d.key])
            txt += `  ${d.label} × ${qty} = $${qty * d.val}\n`
          })
        }
        if (discrepancyNote.value.trim()) {
          txt += `\n📝 _${discrepancyNote.value.trim()}_\n`
        }
      }

      const url = `https://wa.me/?text=${encodeURIComponent(txt)}`
      window.open(url, '_blank')
    }

    /* ══════════════════════════════
       MESAS / OPEN ORDERS
    ══════════════════════════════ */
    /* ══════════════════════════════
       DENOMINACIONES (arqueo)
    ══════════════════════════════ */
    const DENOMS = [
      // Monedas
      { key: 'c050', val: 0.5,  label: '50¢',   group: 'Monedas'  },
      { key: 'c1',   val: 1,    label: '$1',     group: 'Monedas'  },
      { key: 'c2',   val: 2,    label: '$2',     group: 'Monedas'  },
      { key: 'c5',   val: 5,    label: '$5',     group: 'Monedas'  },
      { key: 'c10',  val: 10,   label: '$10',    group: 'Monedas'  },
      // Billetes
      { key: 'b20',  val: 20,   label: '$20',    group: 'Billetes' },
      { key: 'b50',  val: 50,   label: '$50',    group: 'Billetes' },
      { key: 'b100', val: 100,  label: '$100',   group: 'Billetes' },
      { key: 'b200', val: 200,  label: '$200',   group: 'Billetes' },
      { key: 'b500', val: 500,  label: '$500',   group: 'Billetes' },
      { key: 'b1000',val: 1000, label: '$1000',  group: 'Billetes' },
    ]
    const denomCounts = reactive({})
    DENOMS.forEach(d => { denomCounts[d.key] = 0 })

    const denominationTotal = computed(() =>
      parseFloat(DENOMS.reduce((s, d) => s + (Number(denomCounts[d.key]) || 0) * d.val, 0).toFixed(2))
    )
    const denomHasData = computed(() => DENOMS.some(d => (Number(denomCounts[d.key]) || 0) > 0))

    function denomFmt(v) {
      if (v === 0) return '0'
      return v % 1 === 0 ? String(v) : v.toFixed(2)
    }

    const discrepancyNote = ref('')

    function resetDenoms() {
      DENOMS.forEach(d => { denomCounts[d.key] = 0 })
      discrepancyNote.value = ''
    }

    /* ══════════════════════════════
       MESAS / OPEN ORDERS
    ══════════════════════════════ */
    const MESAS = [
      { id: 'mesa-1', label: 'Mesa 1' },
      { id: 'mesa-2', label: 'Mesa 2' },
      { id: 'mesa-3', label: 'Mesa 3' },
    ]
    const activeMesa = reactive({ id: null, customerName: '' })
    const openOrders = ref([])

    function mesaLabel(id) {
      if (!id) return 'Sin destino'
      if (id === 'llevar') return 'Para Llevar'
      return MESAS.find(m => m.id === id)?.label ?? id
    }

    function saveComanda() {
      if (!cart.value.length) return
      const existing = activeMesa.id
        ? openOrders.value.find(o => o.mesaId === activeMesa.id)
        : null
      if (existing) {
        // Agregar items a la cuenta existente
        existing.items = [...existing.items, ...cart.value.map(c => ({ ...c }))]
        if (orderNote.value.trim()) existing.note = [existing.note, orderNote.value.trim()].filter(Boolean).join(' · ')
        toast(`Agregado a ${existing.mesaLabel}`, 'success', '📋')
      } else {
        const label = activeMesa.id === 'llevar'
          ? (activeMesa.customerName.trim() ? `Para Llevar — ${activeMesa.customerName.trim()}` : 'Para Llevar')
          : (activeMesa.id ? mesaLabel(activeMesa.id) : `Comanda ${openOrders.value.length + 1}`)
        openOrders.value.push({
          id: Date.now(),
          mesaId: activeMesa.id,
          mesaLabel: label,
          customerName: activeMesa.customerName.trim(),
          items: cart.value.map(c => ({ ...c })),
          note: orderNote.value.trim(),
          openedAt: new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
        })
        toast(`Guardado en ${label}`, 'success', '📋')
      }
      clearCart()
      activeTab.value = 'mesas'
    }

    function loadOpenOrder(oo) {
      // Cargar en carrito + seleccionar mesa
      cart.value = oo.items.map(c => ({ ...c }))
      orderNote.value = oo.note ?? ''
      activeMesa.id = oo.mesaId
      activeMesa.customerName = oo.customerName ?? ''
      // Eliminar de open orders (se re-guardará o cobrará)
      openOrders.value = openOrders.value.filter(o => o.id !== oo.id)
      activeTab.value = 'pos'
      toast(`${oo.mesaLabel} cargada en carrito`, 'info', '🪑')
    }

    function loadAndPay(oo) {
      cart.value = oo.items.map(c => ({ ...c }))
      orderNote.value = oo.note ?? ''
      activeMesa.id = oo.mesaId
      activeMesa.customerName = oo.customerName ?? ''
      openOrders.value = openOrders.value.filter(o => o.id !== oo.id)
      openPayModal()
    }

    function deleteOpenOrder(id) {
      openOrders.value = openOrders.value.filter(o => o.id !== id)
      toast('Cuenta eliminada', 'info', '🗑️')
    }

    watch(openOrders, v => { try { localStorage.setItem('lv_open_orders', JSON.stringify(v)) } catch (e) {} }, { deep: true })

    /* ══════════════════════════════
       PAYMENT FLOW
    ══════════════════════════════ */
    const payModal = reactive({ show: false, step: 'method', method: null, cashGiven: 0, total: 0, mesaLabel: '' })
    const changePayModal = reactive({ show: false, order: null, selected: '' })

    const payChangeVal = computed(() => (payModal.cashGiven || 0) - payModal.total)

    function openPayModal() {
      if (!cart.value.length) return
      payModal.total = cartTotal.value
      payModal.mesaLabel = activeMesa.id
        ? (activeMesa.id === 'llevar'
            ? (activeMesa.customerName ? `Para Llevar — ${activeMesa.customerName}` : 'Para Llevar')
            : mesaLabel(activeMesa.id))
        : ''
      payModal.step = 'method'
      payModal.method = null
      payModal.cashGiven = 0
      payModal.show = true
    }

    function selectPayMethod(method) {
      payModal.method = method
      payModal.step = method === 'Efectivo' ? 'cash' : 'confirm'
    }

    function confirmPayment() {
      if (!session.value.open) { toast('Caja cerrada', 'error', '⚠️'); return }
      const now = new Date()
      const label = payModal.mesaLabel
      orders.value.push({
        id: Date.now(),
        dateStr: now.toISOString().split('T')[0],
        timeStr: now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
        hour: now.getHours(),
        items: cart.value.map(c => ({ ...c })),
        total: payModal.total,
        payment: payModal.method,
        note: orderNote.value,
        mesa: label || null,
        cashReceived: payModal.method === 'Efectivo' ? (payModal.cashGiven || payModal.total) : null,
        change: payModal.method === 'Efectivo' ? payChangeVal.value : null,
        cancelled: false,
      })
      toast(`Cobrado $${payModal.total} — ${payModal.method}`, 'success', '✅')
      payModal.show = false
      clearCart()
    }

    function changeOrderPayment(order) {
      changePayModal.order = order
      changePayModal.selected = order.payment
      changePayModal.show = true
    }

    function applyChangePayment() {
      if (!changePayModal.order || !changePayModal.selected) return
      changePayModal.order.payment = changePayModal.selected
      changePayModal.order.cashReceived = changePayModal.selected === 'Efectivo' ? changePayModal.order.total : null
      changePayModal.order.change = changePayModal.selected === 'Efectivo' ? 0 : null
      toast(`Pago cambiado a ${changePayModal.selected}`, 'success', '💳')
      changePayModal.show = false
    }

    /* ══════════════════════════════
       EGRESOS
    ══════════════════════════════ */
    const egresos = ref([])
    const egresoForm = reactive({ amount: '', desc: '' })

    const todayEgresos = computed(() =>
      egresos.value.filter(e => e.dateStr === new Date().toISOString().split('T')[0])
    )
    const todayEgresosTotal = computed(() =>
      todayEgresos.value.reduce((s, e) => s + e.amount, 0)
    )

    function saveEgreso() {
      if (!egresoForm.amount || !egresoForm.desc.trim()) return
      egresos.value.push({
        id: Date.now(),
        amount: parseFloat(egresoForm.amount),
        desc: egresoForm.desc.trim(),
        time: new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
        dateStr: new Date().toISOString().split('T')[0],
        sessionId: session.value.id,
      })
      toast(`Egreso $${egresoForm.amount} registrado`, 'success', '📤')
      egresoForm.amount = ''
      egresoForm.desc = ''
    }

    watch(egresos, v => { try { localStorage.setItem('lv_egresos', JSON.stringify(v)) } catch (e) {} }, { deep: true })

    /* ══════════════════════════════
       CAJA / SESIÓN
    ══════════════════════════════ */
    const session = ref({ open: false, opening: 0, openedAt: '', id: null })
    const allSessions = ref([])
    const openingCash = ref(500)
    const arqueoCount = ref('')
    const closeModal = reactive({ show: false })
    const confirmModal = reactive({ show: false, title: '', body: '', action: () => {} })

    const arqueoEsperado = computed(() =>
      parseFloat((session.value.opening + todayEfectivo.value - todayEgresosTotal.value).toFixed(2))
    )
    const arqueoDiff = computed(() => {
      if (!denomHasData.value) return 0
      return parseFloat((denominationTotal.value - arqueoEsperado.value).toFixed(2))
    })

    function openSession() {
      session.value = { open: true, opening: openingCash.value || 0, openedAt: new Date().toLocaleString('es-MX'), id: Date.now() }
      toast(`Caja abierta con fondo $${openingCash.value}`, 'success', '🔓')
    }
    function confirmCloseSession() { closeModal.show = true }
    function closeSession() {
      closeModal.show = false
      allSessions.value.push({
        id: session.value.id, openedAt: session.value.openedAt,
        closedAt: new Date().toLocaleString('es-MX'), opening: session.value.opening,
        totalSales: todaySales.value, totalEfectivo: todayEfectivo.value, orderCount: todayOrderCount.value,
        // Arqueo de denominaciones
        denominationTotal: denomHasData.value ? denominationTotal.value : null,
        denomSnapshot: denomHasData.value ? DENOMS.filter(d => (Number(denomCounts[d.key])||0) > 0).map(d => ({ label: d.label, qty: Number(denomCounts[d.key]), sub: (Number(denomCounts[d.key])||0)*d.val, group: d.group })) : null,
        arqueoDiff: denomHasData.value ? arqueoDiff.value : null,
        discrepancyNote: discrepancyNote.value.trim() || null,
      })
      session.value = { open: false, opening: 0, openedAt: '', id: null }
      toast('Caja cerrada y registrada', 'info', '🔒')
    }

    /* ── PIN ── */
    const pinChange = reactive({ current: '', nuevo: '', confirm: '' })
    function changePin() {
      if (pinChange.current !== getPin()) { toast('PIN actual incorrecto', 'error', '⚠️'); return }
      if (pinChange.nuevo.length !== 4 || !/^\d+$/.test(pinChange.nuevo)) { toast('El nuevo PIN debe ser 4 dígitos', 'error', '⚠️'); return }
      if (pinChange.nuevo !== pinChange.confirm) { toast('Los PINs no coinciden', 'error', '⚠️'); return }
      localStorage.setItem('lv_pin', pinChange.nuevo)
      pinChange.current = ''; pinChange.nuevo = ''; pinChange.confirm = ''
      toast('PIN actualizado', 'success', '🔑')
    }

    /* ── EXPORTAR ── */
    function exportJSON() {
      const blob = new Blob([JSON.stringify({ orders: orders.value, sessions: allSessions.value, exported: new Date().toISOString() }, null, 2)], { type: 'application/json' })
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `lv-caja-${todayStr}.json`; a.click()
      toast('JSON exportado', 'success', '📁')
    }
    function exportCSV() {
      const rows = [['ID', 'Fecha', 'Hora', 'Productos', 'Total', 'Pago', 'Notas', 'Cancelada']]
      orders.value.forEach(o => rows.push([o.id, o.dateStr, o.timeStr, o.items.map(c => `${c.qty}x ${c.name}`).join('; '), o.total, o.payment, o.note || '', o.cancelled ? 'Sí' : 'No']))
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n')
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' })
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `lv-ordenes-${todayStr}.csv`; a.click()
      toast('CSV exportado', 'success', '📊')
    }
    function confirmClearData() {
      confirmModal.title = 'BORRAR ÓRDENES DEL DÍA'
      confirmModal.body = `¿Eliminar todas las órdenes del ${filterDate.value}?`
      confirmModal.action = () => { orders.value = orders.value.filter(o => o.dateStr !== filterDate.value); toast('Órdenes eliminadas', 'info', '🗑️') }
      confirmModal.show = true
    }

    /* ══════════════════════════════
       TOASTS
    ══════════════════════════════ */
    const toasts = ref([])
    let toastId = 0
    function toast(msg, type = 'success', icon = '✅') {
      const id = ++toastId
      toasts.value.push({ id, msg, type, icon })
      setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id) }, 2800)
    }

    /* ══════════════════════════════
       PERSISTENCIA localStorage
    ══════════════════════════════ */
    watch(orders, v => { try { localStorage.setItem('lv_orders', JSON.stringify(v)) } catch (e) {} }, { deep: true })
    watch(session, v => { try { localStorage.setItem('lv_session', JSON.stringify(v)) } catch (e) {} }, { deep: true })
    watch(allSessions, v => { try { localStorage.setItem('lv_sessions', JSON.stringify(v)) } catch (e) {} }, { deep: true })

    onMounted(() => {
      try {
        // Menú cacheado
        const cache = JSON.parse(localStorage.getItem('lv_menu_cache') || '{}')
        if (cache.menus?.length) {
          menus.value = cache.menus
          mgMap.value = cache.mgMap || {}
          menuCachedAt.value = cache.cachedAt || ''
        }

        // Órdenes, sesión, historial
        const savedOrders = localStorage.getItem('lv_orders')
        if (savedOrders) orders.value = JSON.parse(savedOrders)
        const savedSession = localStorage.getItem('lv_session')
        if (savedSession) session.value = JSON.parse(savedSession)
        const savedSessions = localStorage.getItem('lv_sessions')
        if (savedSessions) allSessions.value = JSON.parse(savedSessions)
        // Cuentas abiertas y egresos
        const savedOpenOrders = localStorage.getItem('lv_open_orders')
        if (savedOpenOrders) openOrders.value = JSON.parse(savedOpenOrders)
        const savedEgresos = localStorage.getItem('lv_egresos')
        if (savedEgresos) egresos.value = JSON.parse(savedEgresos)
      } catch (e) { console.warn('Storage error', e) }
    })

    return {
      unlocked, pinInput, pinError, pinPress,
      tabs, activeTab,
      menus, mgMap, allItems, categories, menuLoading, menuError, menuCachedAt, loadMenu,
      activeCat, searchQ, filteredItems, cartQty,
      itemModal, activeModGroups, itemModalTotal, openItemModal, toggleMultiMod, confirmItemModal,
      cart, orderNote, cartTotal, changeQty, removeFromCart, clearCart,
      MESAS, activeMesa, openOrders, saveComanda, loadOpenOrder, loadAndPay, deleteOpenOrder,
      payModal, payChangeVal, openPayModal, selectPayMethod, confirmPayment,
      changePayModal, changeOrderPayment, applyChangePayment,
      egresos, egresoForm, todayEgresos, todayEgresosTotal, saveEgreso,
      orders, filterDate, todayStr, dayOrders, dayTotal, dayAvg, dayCancelled, cancelOrder,
      payMethodsList, payTotals, topProducts, topCats, hourlyData, shareReportWhatsApp,
      todaySales, todayOrderCount, todayEfectivo,
      session, allSessions, openingCash, arqueoCount, arqueoEsperado, arqueoDiff,
      openSession, confirmCloseSession, closeSession, closeModal,
      DENOMS, denomCounts, denominationTotal, denomHasData, denomFmt, discrepancyNote, resetDenoms,
      pinChange, changePin,
      exportJSON, exportCSV, confirmClearData, confirmModal,
      toasts,
    }
  }
}).mount('#app')
</script>
</body>
</html>
